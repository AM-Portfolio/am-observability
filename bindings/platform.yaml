apiVersion: am.obs/v1
kind: ObservabilityBindings
# Shared LGTM stack (one Grafana/Prometheus/Loki/Tempo for am-apps-*).
# Env (preprod/prod/dev) is selected via Grafana $namespace and/or each
# service observability.yaml — not via separate binding files.
env: platform

# Stable UIDs — must match am-infra grafana-datasources-configmap.yaml.
inputs:
  metrics:
    adapter: prometheus
    datasource_uid: prometheus
  logs:
    adapter: loki
    datasource_uid: loki
  traces:
    adapter: tempo
    datasource_uid: tempo

outputs:
  dashboards:
    renderer: grafana
    publisher: grafana_configmap
    namespace: monitoring
    folder: "AM / Technical"
