# Service registry (optional pointers for local generate fixtures only)
#
# Do NOT grow this file for every production service.
# Plane A: services appear via Prometheus labels after deploy.
# Shared dashboards do not require registry entries.
#
services:
  - id: am-portfolio
    repo: am-portfolio
    path: observability.yaml
    ref: main
    enabled: true
  - id: am-logging
    repo: am-logging
    path: observability.yaml
    ref: main
    enabled: false
