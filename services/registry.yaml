# Service registry (pointers only — manifests live in each service repo)
# Set enabled: true when that pilot/wave is ready for generate.
services:
  - id: am-portfolio
    repo: am-portfolio
    path: observability.yaml
    ref: main
    enabled: true
  - id: am-logging
    repo: am-logging
    path: observability.yaml
    ref: main
    enabled: false
  - id: am-trade-management
    repo: am-trade-management
    path: observability.yaml
    ref: main
    enabled: true
