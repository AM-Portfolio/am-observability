    kind: metric
    description: JVM GC pause rate
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          rate(jvm_gc_pause_seconds_sum{application="$application"}[5m])
        legend: "{{action}}"

  jvm_threads_live:
    id: jvm_threads_live
    kind: metric
    description: Live JVM threads (thread leak signal)
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          jvm_threads_live_threads{application="$application"}

  jvm_heap_used_ratio:
    id: jvm_heap_used_ratio
    kind: metric
