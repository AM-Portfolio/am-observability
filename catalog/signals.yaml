    kind: metric
    description: Running pod count for this service (cAdvisor)
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          count(
            count by (pod) (
              container_memory_working_set_bytes{namespace="$namespace",pod=~"$pod",container!="",container!="POD"}
            )
          )

  k8s_image_version:
    id: k8s_image_version
    kind: metric
    description: Container image(s) currently running
    panel_type: table
    adapters: [prometheus]
    adapter_map:
      prometheus:
        join_field: image
        queries:
          - refId: Image
            legend: pods
            expr_template: >-
              count by (image) (
                container_cpu_usage_seconds_total{namespace="$namespace",pod=~"$pod",container!="",container!="POD"}
              )

  k8s_helm_chart:
    id: k8s_helm_chart
    kind: metric
    description: Helm chart version label on pods (helm.sh/chart)
    panel_type: table
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        join_field: helm_sh_chart
        queries:
          - refId: Chart
            legend: pods
            expr_template: >-
              count by (helm_sh_chart) (
                up{namespace="$namespace",pod=~"$pod",helm_sh_chart!=""}
              )
              or
              label_replace(
                count by (label_helm_sh_chart) (
                  kube_pod_labels{namespace="$namespace",pod=~"$pod",label_helm_sh_chart!=""}
                ),
                "helm_sh_chart", "$1", "label_helm_sh_chart", "(.*)"
              )

  k8s_app_version:
    id: k8s_app_version
    kind: metric
    description: App version label on pods (app.kubernetes.io/version)
    panel_type: table
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        join_field: app_kubernetes_io_version
        queries:
          - refId: Version
            legend: pods
            expr_template: >-
              count by (app_kubernetes_io_version) (
                up{namespace="$namespace",pod=~"$pod",app_kubernetes_io_version!=""}
              )
              or
              label_replace(
                count by (label_app_kubernetes_io_version) (
                  kube_pod_labels{namespace="$namespace",pod=~"$pod",label_app_kubernetes_io_version!=""}
                ),
                "app_kubernetes_io_version", "$1", "label_app_kubernetes_io_version", "(.*)"
              )

  k8s_cpu_usage:
    id: k8s_cpu_usage
    kind: metric
    description: Container CPU usage (cAdvisor)
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(rate(container_cpu_usage_seconds_total{namespace="$namespace",pod=~"$pod",container!="",container!="POD"}[5m]))

  k8s_memory_usage:
    id: k8s_memory_usage
    kind: metric
    description: Container memory working set
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(container_memory_working_set_bytes{namespace="$namespace",pod=~"$pod",container!="",container!="POD"})

  k8s_restarts:
    id: k8s_restarts
    kind: metric
    description: Pod container restart total (kube-state-metrics)
    panel_type: stat
    adapters: [prometheus]
    optional: true
    omit_warn: "Requires kube-state-metrics; omit+warn if missing on cluster"
    adapter_map:
      prometheus:
        expr_template: >-
          sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"})

  service_health_up:
    id: service_health_up
    kind: metric
    description: Prometheus scrape target up for this pod
    panel_type: stat
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$pod"})
            or max(up{kubernetes_namespace="$namespace",kubernetes_pod_name=~"$pod"})

  service_health_score:
    id: service_health_score
    kind: metric
    description: >-
      Quick-decision health score 0–100 (scrape, restarts, 5xx ratio, heap).
      GOOD≥80, WATCH 50–79, ACT <50.
    panel_type: gauge
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          clamp_min(
            clamp_max(
              100
              - 40 * (1 - clamp_max(
                  max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$pod"})
                    or max(up{namespace="$namespace",pod=~"$pod"})
                    or vector(0),
                  1))
              - 15 * clamp_max(
                  ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"}) or vector(0)) > bool 0),
                  1)
              - 10 * clamp_max(
                  ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"}) or vector(0)) >= bool 3),
                  1)
              - 15 * clamp_max(
                  (
                    (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                    /
                    clamp_min(
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                      1e-9
                    )
                    >= bool 0.01
                  ),
                  1)
              - 15 * clamp_max(
                  (
                    (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                    /
                    clamp_min(
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                      1e-9
                    )
                    >= bool 0.05
                  ),
                  1)
              - 10 * clamp_max(
                  (
                    (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                    /
                    clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                    >= bool 0.7
                  ),
                  1)
              - 10 * clamp_max(
                  (
                    (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                    /
                    clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                    >= bool 0.9
                  ),
                  1),
              100),
            0)

  service_health_status:
    id: service_health_status
    kind: metric
    description: Decision band from health score — 2=GOOD, 1=WATCH, 0=ACT
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          (
            clamp_min(
              clamp_max(
                100
                - 40 * (1 - clamp_max(
                    max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$pod"})
                      or max(up{namespace="$namespace",pod=~"$pod"})
                      or vector(0),
                    1))
                - 15 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"}) or vector(0)) > bool 0),
                    1)
                - 10 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"}) or vector(0)) >= bool 3),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.01
                    ),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.05
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.7
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.9
                    ),
                    1),
                100),
              0)
            >= bool 80
          )
          +
          (
            clamp_min(
              clamp_max(
                100
                - 40 * (1 - clamp_max(
                    max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$pod"})
                      or max(up{namespace="$namespace",pod=~"$pod"})
                      or vector(0),
                    1))
                - 15 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"}) or vector(0)) > bool 0),
                    1)
                - 10 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$pod"}) or vector(0)) >= bool 3),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.01
                    ),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.05
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.7
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.9
                    ),
                    1),
                100),
              0)
            >= bool 50
          )

  # ── Logs / traces ───────────────────────────────────────────
  service_logs_all:
    id: service_logs_all
    kind: log
    description: All service logs for namespace+pod prefix
    panel_type: logs
    adapters: [loki]
    adapter_map:
      loki:
        expr_template: '{namespace="$namespace",pod=~"$pod"}'

  service_error_logs:
    id: service_error_logs
    kind: log
    description: Error-level service logs
    panel_type: logs
    adapters: [loki]
    adapter_map:
      loki:
        expr_template: >-
          {namespace="$namespace",pod=~"$pod"} |~ "(?i)error|exception|fatal|failed"

  trace_latency_p95:
    id: trace_latency_p95
    kind: trace
    description: Tempo explore link for service latency
    panel_type: link
    adapters: [tempo]
    adapter_map:
      tempo:
        link_template: >-
          /explore?orgId=1&left=["now-1h","now","tempo",{"query":"{$service=$application}","queryType":"traceql"}]
        search: 'service.name="$application"'

  # ── Platform / infra (server-side; namespace dropdown, not app $application) ──
  platform_ns_pod_count:
    id: platform_ns_pod_count
    kind: metric
    description: Running pod count in selected platform namespace (cAdvisor)
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          count(
            count by (pod) (
              container_memory_working_set_bytes{namespace="$namespace",container!="",container!="POD"}
            )
          )

  platform_ns_cpu:
    id: platform_ns_cpu
    kind: metric
    description: CPU usage by pod in platform namespace
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{pod}}"
        expr_template: >-
          sum by (pod) (
            rate(container_cpu_usage_seconds_total{namespace="$namespace",container!="",container!="POD"}[5m])
          )

  platform_ns_memory:
    id: platform_ns_memory
    kind: metric
    description: Memory working set by pod in platform namespace
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{pod}}"
        expr_template: >-
          sum by (pod) (
            container_memory_working_set_bytes{namespace="$namespace",container!="",container!="POD"}
          )

  platform_ns_cpu_total:
    id: platform_ns_cpu_total
    kind: metric
    description: Total CPU cores used in platform namespace
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(rate(container_cpu_usage_seconds_total{namespace="$namespace",container!="",container!="POD"}[5m]))

  platform_ns_memory_total:
    id: platform_ns_memory_total
    kind: metric
    description: Total memory working set in platform namespace
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(container_memory_working_set_bytes{namespace="$namespace",container!="",container!="POD"})

  platform_ns_logs:
    id: platform_ns_logs
    kind: log
    description: All logs for selected platform namespace
    panel_type: logs
    adapters: [loki]
    adapter_map:
      loki:
        expr_template: '{namespace="$namespace"}'

  platform_ns_error_logs:
    id: platform_ns_error_logs
    kind: log
    description: Error-level logs for platform namespace
    panel_type: logs
    adapters: [loki]
    adapter_map:
      loki:
        expr_template: >-
          {namespace="$namespace"} |~ "(?i)error|exception|fatal|failed|panic"

  infra_redis_up:
    id: infra_redis_up
    kind: metric
    description: Redis exporter scrape up (infra redis)
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          max(redis_up{namespace="$namespace",pod=~"$pod"})
            or max(up{namespace="$namespace",pod=~"$pod",job="kubernetes-pods"})

  infra_redis_clients:
    id: infra_redis_clients
    kind: metric
    description: Redis connected clients
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: clients
        expr_template: >-
          redis_connected_clients{namespace="$namespace",pod=~"$pod"}

  infra_redis_memory:
    id: infra_redis_memory
    kind: metric
    description: Redis used memory
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: used
        expr_template: >-
          redis_memory_used_bytes{namespace="$namespace",pod=~"$pod"}

  infra_redis_commands:
    id: infra_redis_commands
    kind: metric
    description: Redis commands processed rate
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: commands/s
        expr_template: >-
          rate(redis_commands_processed_total{namespace="$namespace",pod=~"$pod"}[5m])

  infra_redis_hit_ratio:
    id: infra_redis_hit_ratio
    kind: metric
    description: Redis keyspace hit ratio
    panel_type: gauge
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(rate(redis_keyspace_hits_total{namespace="$namespace",pod=~"$pod"}[5m]))
          /
          clamp_min(
            sum(rate(redis_keyspace_hits_total{namespace="$namespace",pod=~"$pod"}[5m]))
            + sum(rate(redis_keyspace_misses_total{namespace="$namespace",pod=~"$pod"}[5m])),
            1e-9
          )

  infra_redis_blocked:
    id: infra_redis_blocked
    kind: metric
    description: Redis blocked clients
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: blocked
        expr_template: >-
          redis_blocked_clients{namespace="$namespace",pod=~"$pod"}

  infra_mongo_up:
    id: infra_mongo_up
    kind: metric
    description: MongoDB exporter scrape up
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          max(mongodb_up{namespace="$namespace",pod=~"$pod"})
            or max(up{namespace="$namespace",pod=~"$pod",job="kubernetes-pods"})

  infra_mongo_connections:
    id: infra_mongo_connections
    kind: metric
    description: MongoDB current connections
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: current
        expr_template: >-
          mongodb_connections{namespace="$namespace",pod=~"$pod",state="current"}
            or mongodb_ss_connections{namespace="$namespace",pod=~"$pod",conn_type="current"}

  infra_mongo_ops:
    id: infra_mongo_ops
    kind: metric
    description: MongoDB operations rate
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{type}}"
        expr_template: >-
          sum by (type) (
            rate(mongodb_op_counters_total{namespace="$namespace",pod=~"$pod"}[5m])
          )
            or sum by (type) (
              rate(mongodb_ss_opcounters{namespace="$namespace",pod=~"$pod"}[5m])
            )

  infra_mongo_memory:
    id: infra_mongo_memory
    kind: metric
    description: MongoDB resident memory
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: resident
        expr_template: >-
          mongodb_memory{namespace="$namespace",pod=~"$pod",type="resident"}
            or mongodb_ss_mem_resident{namespace="$namespace",pod=~"$pod"}

  infra_postgres_up:
    id: infra_postgres_up
    kind: metric
    description: Postgres exporter scrape up
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          max(pg_up{namespace="$namespace",pod=~"$pod"})
            or max(up{namespace="$namespace",pod=~"$pod",job="kubernetes-pods"})

  infra_postgres_connections:
    id: infra_postgres_connections
    kind: metric
    description: Postgres active connections
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{datname}}"
        expr_template: >-
          sum by (datname) (
            pg_stat_activity_count{namespace="$namespace",pod=~"$pod",state="active"}
          )

  infra_postgres_txns:
    id: infra_postgres_txns
    kind: metric
    description: Postgres transaction commit/rollback rate
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{datname}} commits"
        expr_template: >-
          sum by (datname) (rate(pg_stat_database_xact_commit{namespace="$namespace",pod=~"$pod",datname!=""}[5m]))

  infra_postgres_cache_hit:
    id: infra_postgres_cache_hit
    kind: metric
    description: Postgres buffer cache hit ratio
    panel_type: gauge
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(rate(pg_stat_database_blks_hit{namespace="$namespace",pod=~"$pod",datname!=""}[5m]))
          /
          clamp_min(
            sum(rate(pg_stat_database_blks_hit{namespace="$namespace",pod=~"$pod",datname!=""}[5m]))
            + sum(rate(pg_stat_database_blks_read{namespace="$namespace",pod=~"$pod",datname!=""}[5m])),
            1e-9
          )

  infra_postgres_deadlocks:
    id: infra_postgres_deadlocks
    kind: metric
    description: Postgres deadlock rate
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: deadlocks/s
        expr_template: >-
          sum(rate(pg_stat_database_deadlocks{namespace="$namespace",pod=~"$pod",datname!=""}[5m]))

  # ── Kafka broker / topic / consumer-group (kafka_exporter) ──
  infra_kafka_brokers:
    id: infra_kafka_brokers
    kind: metric
    description: Number of Kafka brokers visible to exporter
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          max(kafka_brokers{namespace="$namespace"})

  infra_kafka_exporter_up:
    id: infra_kafka_exporter_up
    kind: metric
    description: kafka_exporter scrape up
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          max(up{namespace="$namespace",pod=~"kafka-exporter.*",job="kubernetes-pods"})

  infra_kafka_topic_partitions:
    id: infra_kafka_topic_partitions
    kind: metric
    description: Partition count by topic
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{topic}}"
        expr_template: >-
          kafka_topic_partitions{namespace="$namespace",topic=~"$topic"}

  infra_kafka_msg_in:
    id: infra_kafka_msg_in
    kind: metric
    description: Approximate messages written per second (rate of log-end offset)
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{topic}}-p{{partition}}"
        expr_template: >-
          sum by (topic, partition) (
            rate(kafka_topic_partition_current_offset{namespace="$namespace",topic=~"$topic"}[5m])
          )

  infra_kafka_msg_in_by_topic:
    id: infra_kafka_msg_in_by_topic
    kind: metric
    description: Messages in / s by topic
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{topic}}"
        expr_template: >-
          topk(20,
            sum by (topic) (
              rate(kafka_topic_partition_current_offset{namespace="$namespace",topic=~"$topic"}[5m])
            )
          )

  infra_kafka_log_end_offset:
    id: infra_kafka_log_end_offset
    kind: metric
    description: Log end offset by topic partition
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{topic}}-p{{partition}}"
        expr_template: >-
          kafka_topic_partition_current_offset{namespace="$namespace",topic=~"$topic"}

  infra_kafka_log_start_offset:
    id: infra_kafka_log_start_offset
    kind: metric
    description: Oldest retained offset by topic partition
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{topic}}-p{{partition}}"
        expr_template: >-
          kafka_topic_partition_oldest_offset{namespace="$namespace",topic=~"$topic"}

  infra_kafka_under_replicated:
    id: infra_kafka_under_replicated
    kind: metric
    description: Under-replicated partitions (0 expected with RF=1)
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(kafka_topic_partition_under_replicated_partition{namespace="$namespace",topic=~"$topic"})
            or vector(0)

  infra_kafka_cg_lag:
    id: infra_kafka_cg_lag
    kind: metric
    description: Consumer group lag by topic partition
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{consumergroup}} {{topic}}-p{{partition}}"
        expr_template: >-
          kafka_consumergroup_lag{namespace="$namespace",consumergroup=~"$consumergroup",topic=~"$topic"}

  infra_kafka_cg_lag_sum:
    id: infra_kafka_cg_lag_sum
    kind: metric
    description: Total lag by consumer group
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{consumergroup}}"
        expr_template: >-
          topk(20,
            sum by (consumergroup) (
              kafka_consumergroup_lag{namespace="$namespace",consumergroup=~"$consumergroup",topic=~"$topic"}
            )
          )

  infra_kafka_cg_lag_max:
    id: infra_kafka_cg_lag_max
    kind: metric
    description: Max partition lag across filtered groups
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          max(kafka_consumergroup_lag{namespace="$namespace",consumergroup=~"$consumergroup",topic=~"$topic"})
            or vector(0)

  infra_kafka_cg_current_offset:
    id: infra_kafka_cg_current_offset
    kind: metric
    description: Consumer group current offset
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        legend: "{{consumergroup}} {{topic}}-p{{partition}}"
        expr_template: >-
          kafka_consumergroup_current_offset{namespace="$namespace",consumergroup=~"$consumergroup",topic=~"$topic"}

  infra_kafka_cg_members:
    id: infra_kafka_cg_members
    kind: metric
    description: Consumer group member count
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        legend: "{{consumergroup}}"
        expr_template: >-
          kafka_consumergroup_members{namespace="$namespace",consumergroup=~"$consumergroup"}
