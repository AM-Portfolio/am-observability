    panel_type: gauge
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(jvm_memory_used_bytes{application="$application",area="heap"})
          /
          clamp_min(sum(jvm_memory_max_bytes{application="$application",area="heap"}), 1)

  process_uptime:
    id: process_uptime
    kind: metric
    description: Process uptime seconds
    panel_type: stat
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          max(time() - process_start_time_seconds{application="$application",namespace="$namespace"})

  process_cpu_usage:
    id: process_cpu_usage
    kind: metric
    description: Process CPU usage ratio (0-1)
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          process_cpu_usage{application="$application"}

  process_files_open:
    id: process_files_open
    kind: metric
    description: Open file descriptors
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          process_files_open_files{application="$application"}

  system_cpu_usage:
    id: system_cpu_usage
    kind: metric
    description: System CPU usage ratio (0-1)
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          system_cpu_usage{application="$application"}

  logback_events:
    id: logback_events
    kind: metric
    description: Logback event rate by level (error/warn/info)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum by (level) (rate(logback_events_total{application="$application"}[5m]))
        legend: "{{level}}"

  tomcat_threads_busy:
    id: tomcat_threads_busy
    kind: metric
    description: Busy Tomcat request threads (saturation)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          tomcat_threads_busy_threads{application="$application"}

  # ── Data stores / messaging (optional — empty until binders emit) ──
  # Filters ($mongo_command / $redis_command / $kafka_* / $hikari_pool) are
  # section-scoped: only these queries reference them; HTTP panels ignore them.
  mongo_commands:
    id: mongo_commands
    kind: metric
    description: MongoDB driver command rate (filter mongo_command · 5a only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          topk(15, sum by (command) (rate(mongodb_driver_commands_seconds_count{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])))
        legend: "{{command}}"

  mongo_pool_checkedout:
    id: mongo_pool_checkedout
    kind: metric
    description: MongoDB connection pool checked-out connections
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum(mongodb_driver_pool_checkedout{application="$application",namespace="$namespace"})
        legend: checked-out

  mongo_commands_p95:
    id: mongo_commands_p95
    kind: metric
    description: MongoDB command latency (p95 histogram, else avg from sum/count)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        # Prefer histogram p95; fall back to avg when buckets are not published
        expr_template: >-
          (
            histogram_quantile(
              0.95,
              sum by (command, le) (
                rate(mongodb_driver_commands_seconds_bucket{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])
              )
            )
          )
          or
          (
            sum by (command) (
              rate(mongodb_driver_commands_seconds_sum{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])
            )
            /
            clamp_min(
              sum by (command) (
                rate(mongodb_driver_commands_seconds_count{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])
              ),
              1e-9
            )
          )
        legend: "{{command}}"

  mongo_pool_size:
    id: mongo_pool_size
    kind: metric
    description: MongoDB connection pool size
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum(mongodb_driver_pool_size{application="$application",namespace="$namespace"})
        legend: pool size

  redis_commands:
    id: redis_commands
    kind: metric
    description: Redis/Lettuce command rate by command (filter redis_command · 5b only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          topk(15, sum by (command) (rate(lettuce_command_completion_seconds_count{application="$application",namespace="$namespace",command=~"$redis_command"}[5m])))
        legend: "{{command}}"

  redis_commands_p95:
    id: redis_commands_p95
    kind: metric
    description: Redis command latency (p95 or avg fallback)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          (
            histogram_quantile(
              0.95,
              sum by (command, le) (
                rate(lettuce_command_completion_seconds_bucket{application="$application",namespace="$namespace",command=~"$redis_command"}[5m])
              )
            )
          )
          or
          (
            sum by (command) (
              rate(lettuce_command_completion_seconds_sum{application="$application",namespace="$namespace",command=~"$redis_command"}[5m])
            )
            /
            clamp_min(
              sum by (command) (
                rate(lettuce_command_completion_seconds_count{application="$application",namespace="$namespace",command=~"$redis_command"}[5m])
              ),
              1e-9
            )
          )
        legend: "{{command}}"

  kafka_listener:
    id: kafka_listener
    kind: metric
    description: Spring Kafka listener invoke rate (filter kafka_listener · 5c only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          topk(15, sum by (name) (rate(spring_kafka_listener_seconds_count{application="$application",namespace="$namespace",name=~"$kafka_listener"}[5m])))
        legend: "{{name}}"

  kafka_listener_errors:
    id: kafka_listener_errors
    kind: metric
    description: Spring Kafka listener error rate (filter kafka_listener · 5c only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          topk(15, sum by (name) (rate(spring_kafka_listener_seconds_count{application="$application",namespace="$namespace",name=~"$kafka_listener",result="failure"}[5m])))
        legend: "{{name}}"

  kafka_listener_p95:
    id: kafka_listener_p95
    kind: metric
    description: Spring Kafka listener duration p95 (or avg fallback)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          (
            histogram_quantile(
              0.95,
              sum by (name, le) (
                rate(spring_kafka_listener_seconds_bucket{application="$application",namespace="$namespace",name=~"$kafka_listener"}[5m])
              )
            )
          )
          or
          (
            sum by (name) (
              rate(spring_kafka_listener_seconds_sum{application="$application",namespace="$namespace",name=~"$kafka_listener"}[5m])
            )
            /
            clamp_min(
              sum by (name) (
                rate(spring_kafka_listener_seconds_count{application="$application",namespace="$namespace",name=~"$kafka_listener"}[5m])
              ),
              1e-9
            )
          )
        legend: "{{name}}"

  kafka_consumer_lag:
    id: kafka_consumer_lag
    kind: metric
    description: Kafka consumer records lag by topic (filter kafka_topic · 5c only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          topk(15, (
            sum by (topic) (kafka_consumer_fetch_manager_records_lag{application="$application",namespace="$namespace",topic=~"$kafka_topic"})
            or sum by (topic) (spring_kafka_listener_lag{application="$application",namespace="$namespace",topic=~"$kafka_topic"})
          ))
        legend: "{{topic}}"

  hikari_connections_active:
    id: hikari_connections_active
    kind: metric
    description: HikariCP active connections (filter hikari_pool · 5d only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum by (pool) (hikaricp_connections_active{application="$application",namespace="$namespace",pool=~"$hikari_pool"})
        legend: "{{pool}}"

  hikari_connections_pending:
    id: hikari_connections_pending
    kind: metric
    description: HikariCP pending connection requests (filter hikari_pool · 5d only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum by (pool) (hikaricp_connections_pending{application="$application",namespace="$namespace",pool=~"$hikari_pool"})
        legend: "{{pool}}"

  hikari_connections_idle:
    id: hikari_connections_idle
    kind: metric
    description: HikariCP idle connections (filter hikari_pool · 5d only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum by (pool) (hikaricp_connections_idle{application="$application",namespace="$namespace",pool=~"$hikari_pool"})
        legend: "{{pool}}"

  hikari_connections_timeout:
    id: hikari_connections_timeout
    kind: metric
    description: HikariCP connection timeout rate (filter hikari_pool · 5d only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          sum by (pool) (rate(hikaricp_connections_timeout_total{application="$application",namespace="$namespace",pool=~"$hikari_pool"}[5m]))
        legend: "{{pool}}"

  # ── Kubernetes ──────────────────────────────────────────────
  k8s_pod_count:
    id: k8s_pod_count
    kind: metric
    description: Running pod count for this service (cAdvisor)
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          count(
            count by (pod) (
              container_memory_working_set_bytes{namespace="$namespace",pod=~"$app.*",container!="",container!="POD"}
            )
          )

  k8s_image_version:
    id: k8s_image_version
    kind: metric
    description: Container image(s) currently running
    panel_type: table
    adapters: [prometheus]
    adapter_map:
      prometheus:
        join_field: image
        queries:
          - refId: Image
            legend: pods
            expr_template: >-
              count by (image) (
                container_cpu_usage_seconds_total{namespace="$namespace",pod=~"$app.*",container!="",container!="POD"}
              )

  k8s_helm_chart:
    id: k8s_helm_chart
    kind: metric
    description: Helm chart version label on pods (helm.sh/chart)
    panel_type: table
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        join_field: helm_sh_chart
        queries:
          - refId: Chart
            legend: pods
            expr_template: >-
              count by (helm_sh_chart) (
                up{namespace="$namespace",pod=~"$app.*",helm_sh_chart!=""}
              )
              or
              label_replace(
                count by (label_helm_sh_chart) (
                  kube_pod_labels{namespace="$namespace",pod=~"$app.*",label_helm_sh_chart!=""}
                ),
                "helm_sh_chart", "$1", "label_helm_sh_chart", "(.*)"
              )

  k8s_app_version:
    id: k8s_app_version
    kind: metric
    description: App version label on pods (app.kubernetes.io/version)
    panel_type: table
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        join_field: app_kubernetes_io_version
        queries:
          - refId: Version
            legend: pods
            expr_template: >-
              count by (app_kubernetes_io_version) (
                up{namespace="$namespace",pod=~"$app.*",app_kubernetes_io_version!=""}
              )
              or
              label_replace(
                count by (label_app_kubernetes_io_version) (
                  kube_pod_labels{namespace="$namespace",pod=~"$app.*",label_app_kubernetes_io_version!=""}
                ),
                "app_kubernetes_io_version", "$1", "label_app_kubernetes_io_version", "(.*)"
              )

  k8s_cpu_usage:
    id: k8s_cpu_usage
    kind: metric
    description: Container CPU usage (cAdvisor)
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(rate(container_cpu_usage_seconds_total{namespace="$namespace",pod=~"$app.*",container!="",container!="POD"}[5m]))

  k8s_memory_usage:
    id: k8s_memory_usage
    kind: metric
    description: Container memory working set
    panel_type: timeseries
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          sum(container_memory_working_set_bytes{namespace="$namespace",pod=~"$app.*",container!="",container!="POD"})

  k8s_restarts:
    id: k8s_restarts
    kind: metric
    description: Pod container restart total (kube-state-metrics)
    panel_type: stat
    adapters: [prometheus]
    optional: true
    omit_warn: "Requires kube-state-metrics; omit+warn if missing on cluster"
    adapter_map:
      prometheus:
        expr_template: >-
          sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"})

  service_health_up:
    id: service_health_up
    kind: metric
    description: Prometheus scrape target up for this pod
    panel_type: stat
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$app.*"})
            or max(up{kubernetes_namespace="$namespace",kubernetes_pod_name=~"$app.*"})

  service_health_score:
    id: service_health_score
    kind: metric
    description: >-
      Quick-decision health score 0–100 (scrape, restarts, 5xx ratio, heap).
      GOOD≥80, WATCH 50–79, ACT <50.
    panel_type: gauge
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          clamp_min(
            clamp_max(
              100
              - 40 * (1 - clamp_max(
                  max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$app.*"})
                    or max(up{namespace="$namespace",pod=~"$app.*"})
                    or vector(0),
                  1))
              - 15 * clamp_max(
                  ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"}) or vector(0)) > bool 0),
                  1)
              - 10 * clamp_max(
                  ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"}) or vector(0)) >= bool 3),
                  1)
              - 15 * clamp_max(
                  (
                    (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                    /
                    clamp_min(
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                      1e-9
                    )
                    >= bool 0.01
                  ),
                  1)
              - 15 * clamp_max(
                  (
                    (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                    /
                    clamp_min(
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                      1e-9
                    )
                    >= bool 0.05
                  ),
                  1)
              - 10 * clamp_max(
                  (
                    (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                    /
                    clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                    >= bool 0.7
                  ),
                  1)
              - 10 * clamp_max(
                  (
                    (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                    /
                    clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                    >= bool 0.9
                  ),
                  1),
              100),
            0)

  service_health_status:
    id: service_health_status
    kind: metric
    description: Decision band from health score — 2=GOOD, 1=WATCH, 0=ACT
    panel_type: stat
    adapters: [prometheus]
    adapter_map:
      prometheus:
        expr_template: >-
          (
            clamp_min(
              clamp_max(
                100
                - 40 * (1 - clamp_max(
                    max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$app.*"})
                      or max(up{namespace="$namespace",pod=~"$app.*"})
                      or vector(0),
                    1))
                - 15 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"}) or vector(0)) > bool 0),
                    1)
                - 10 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"}) or vector(0)) >= bool 3),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.01
                    ),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.05
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.7
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.9
                    ),
                    1),
                100),
              0)
            >= bool 80
          )
          +
          (
            clamp_min(
              clamp_max(
                100
                - 40 * (1 - clamp_max(
                    max(up{job="kubernetes-pods",namespace="$namespace",pod=~"$app.*"})
                      or max(up{namespace="$namespace",pod=~"$app.*"})
                      or vector(0),
                    1))
                - 15 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"}) or vector(0)) > bool 0),
                    1)
                - 10 * clamp_max(
                    ((sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"}) or vector(0)) >= bool 3),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.01
                    ),
                    1)
                - 15 * clamp_max(
                    (
                      (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace",status=~"5.."}[5m])) or vector(0))
                      /
                      clamp_min(
                        (sum(rate(http_server_requests_seconds_count{application="$application",namespace="$namespace"}[5m])) or vector(0)),
                        1e-9
                      )
                      >= bool 0.05
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.7
                    ),
                    1)
                - 10 * clamp_max(
                    (
                      (sum(jvm_memory_used_bytes{application="$application",area="heap"}) or vector(0))
                      /
                      clamp_min((sum(jvm_memory_max_bytes{application="$application",area="heap"}) or vector(1)), 1)
                      >= bool 0.9
                    ),
                    1),
                100),
              0)
            >= bool 50
          )

  # ── Logs / traces ───────────────────────────────────────────
  service_logs_all:
    id: service_logs_all
    kind: log
    description: All service logs for namespace+pod prefix
    panel_type: logs
    adapters: [loki]
    adapter_map:
      loki:
        expr_template: '{namespace="$namespace",pod=~"$app.*"}'

  service_error_logs:
    id: service_error_logs
    kind: log
    description: Error-level service logs
    panel_type: logs
    adapters: [loki]
    adapter_map:
      loki:
        expr_template: >-
          {namespace="$namespace",pod=~"$app.*"} |~ "(?i)error|exception|fatal|failed"

  trace_latency_p95:
    id: trace_latency_p95
    kind: trace
    description: Tempo explore link for service latency
    panel_type: link
    adapters: [tempo]
    adapter_map:
      tempo:
        link_template: >-
          /explore?orgId=1&left=["now-1h","now","tempo",{"query":"{$service=$service}","queryType":"traceql"}]
        search: 'service.name="$service"'
