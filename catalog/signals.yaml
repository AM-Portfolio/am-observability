        legend: checked-out

  mongo_commands_p95:
    id: mongo_commands_p95
    kind: metric
    description: MongoDB command latency (p95 histogram, else avg from sum/count)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        # Prefer histogram p95; fall back to avg when buckets are not published
        expr_template: >-
          (
            histogram_quantile(
              0.95,
              sum by (command, le) (
                rate(mongodb_driver_commands_seconds_bucket{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])
              )
            )
          )
          or
          (
            sum by (command) (
              rate(mongodb_driver_commands_seconds_sum{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])
            )
            /
            clamp_min(
              sum by (command) (
                rate(mongodb_driver_commands_seconds_count{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])
              ),
              1e-9
            )
          )
        legend: "{{command}}"

