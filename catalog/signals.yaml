  mongo_commands:
    id: mongo_commands
    kind: metric
    description: MongoDB driver command rate (filter mongo_command · 5a only)
    panel_type: timeseries
    adapters: [prometheus]
    optional: true
    adapter_map:
      prometheus:
        expr_template: >-
          topk(15, sum by (command) (rate(mongodb_driver_commands_seconds_count{application="$application",namespace="$namespace",command=~"$mongo_command"}[5m])))
        legend: "{{command}}"

  mongo_pool_checkedout:
