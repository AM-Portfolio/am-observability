apiVersion: am.obs/v1
kind: SignalModule
module: functional
dashboard: functional
signals:
  biz_slow_api_table:
    id: biz_slow_api_table
    kind: metric
    description: "Product table \u2014 calls, fails, avg latency, p95 (sort by avg\
      \ to find 20\u201330s APIs)"
    panel_type: table
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        join_field: api
        queries:
        - refId: Total
          legend: Total
          expr_template: "sum by (api) (\n  label_join(\n    sum by (method, uri)\
            \ (\n      increase(http_server_requests_seconds_count{application=\"\
            $application\",namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\"\
            ,uri!~\".*actuator.*\"}[$__range])\n    ),\n    \"api\", \" \", \"method\"\
            , \"uri\"\n  )\n)"
        - refId: Fail
          legend: Fail
          expr_template: "sum by (api) (\n  label_join(\n    sum by (method, uri)\
            \ (\n      increase(http_server_requests_seconds_count{application=\"\
            $application\",namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\"\
            ,uri!~\".*actuator.*\",status=~\"[45]..\"}[$__range])\n    ),\n    \"\
            api\", \" \", \"method\", \"uri\"\n  )\n) or (\n  sum by (api) (\n   \
            \ label_join(\n      sum by (method, uri) (\n        increase(http_server_requests_seconds_count{application=\"\
            $application\",namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\"\
            ,uri!~\".*actuator.*\"}[$__range])\n      ),\n      \"api\", \" \", \"\
            method\", \"uri\"\n    )\n  ) * 0\n)"
        - refId: Avg
          legend: avg
          expr_template: "sum by (api) (\n  label_join(\n    sum by (method, uri)\
            \ (\n      increase(http_server_requests_seconds_sum{application=\"$application\"\
            ,namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\",uri!~\".*actuator.*\"\
            }[$__range])\n    ),\n    \"api\", \" \", \"method\", \"uri\"\n  )\n)\
            \ / clamp_min(\n  sum by (api) (\n    label_join(\n      sum by (method,\
            \ uri) (\n        increase(http_server_requests_seconds_count{application=\"\
            $application\",namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\"\
            ,uri!~\".*actuator.*\"}[$__range])\n      ),\n      \"api\", \" \", \"\
            method\", \"uri\"\n    )\n  ),\n  1\n)"
        - refId: P95
          legend: p95
          expr_template: "(\n  histogram_quantile(\n    0.95,\n    sum by (api, le)\
            \ (\n      label_join(\n        sum by (method, uri, le) (\n         \
            \ rate(http_server_requests_seconds_bucket{application=\"$application\"\
            ,namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\",uri!~\".*actuator.*\"\
            }[$__range])\n        ),\n        \"api\", \" \", \"method\", \"uri\"\n\
            \      )\n    )\n  )\n) or (\n  sum by (api) (\n    label_join(\n    \
            \  sum by (method, uri) (\n        increase(http_server_requests_seconds_sum{application=\"\
            $application\",namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\"\
            ,uri!~\".*actuator.*\"}[$__range])\n      ),\n      \"api\", \" \", \"\
            method\", \"uri\"\n    )\n  )\n  /\n  clamp_min(\n    sum by (api) (\n\
            \      label_join(\n        sum by (method, uri) (\n          increase(http_server_requests_seconds_count{application=\"\
            $application\",namespace=\"$namespace\",method=~\"$method\",uri=~\"$uri\"\
            ,uri!~\".*actuator.*\"}[$__range])\n        ),\n        \"api\", \" \"\
            , \"method\", \"uri\"\n      )\n    ),\n    1\n  )\n)"
  portfolio_users_total:
    id: portfolio_users_total
    kind: metric
    description: Distinct portfolio owners (domain gauge)
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  portfolio_users_total{application=\"$application\"\
          ,namespace=\"$namespace\"}\n  or portfolio_users{application=\"$application\"\
          ,namespace=\"$namespace\"}\n) or vector(0)"
        legend: Users
  portfolio_portfolios_total:
    id: portfolio_portfolios_total
    kind: metric
    description: Portfolio document count (domain gauge)
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  portfolio_portfolios_total{application=\"$application\"\
          ,namespace=\"$namespace\"}\n  or portfolio_portfolios{application=\"$application\"\
          ,namespace=\"$namespace\"}\n) or vector(0)"
        legend: Portfolios
  portfolio_holdings_total:
    id: portfolio_holdings_total
    kind: metric
    description: Equity holdings count across portfolios (domain gauge)
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  portfolio_holdings_total{application=\"$application\"\
          ,namespace=\"$namespace\"}\n  or portfolio_holdings{application=\"$application\"\
          ,namespace=\"$namespace\"}\n) or vector(0)"
        legend: Holdings
  websocket_sessions_active:
    id: websocket_sessions_active
    kind: metric
    description: Active STOMP WebSocket sessions
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  websocket_sessions_active{application=\"$application\"\
          ,namespace=\"$namespace\"}\n) or vector(0)"
        legend: Sessions
  stomp_connect_total:
    id: stomp_connect_total
    kind: metric
    description: STOMP CONNECT attempts in selected range
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  increase(stomp_connect_total{application=\"\
          $application\",namespace=\"$namespace\"}[$__range])\n) or vector(0)"
        legend: Connects
  stream_relay_messages_total:
    id: stream_relay_messages_total
    kind: metric
    description: Kafka→WebSocket relay messages in selected range
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  increase(stream_relay_messages_total{application=\"\
          $application\",namespace=\"$namespace\"}[$__range])\n) or vector(0)"
        legend: Relays
  orchestrator_events_total:
    id: orchestrator_events_total
    kind: metric
    description: Demand-driven orchestrator events in selected range
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  increase(orchestrator_events_total{application=\"\
          $application\",namespace=\"$namespace\"}[$__range])\n) or vector(0)"
        legend: Orchestrator
  dashboard_widget_publish_total:
    id: dashboard_widget_publish_total
    kind: metric
    description: Dashboard widget Kafka publishes in selected range
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  increase(dashboard_widget_publish_total{application=\"\
          $application\",namespace=\"$namespace\"}[$__range])\n) or vector(0)"
        legend: Widgets
  portfolio_stream_publish_total:
    id: portfolio_stream_publish_total
    kind: metric
    description: Portfolio stream Kafka publishes in selected range
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  increase(portfolio_stream_publish_total{application=\"\
          $application\",namespace=\"$namespace\"}[$__range])\n) or vector(0)"
        legend: Streams
  tool_invocations_total:
    id: tool_invocations_total
    kind: metric
    description: Tool invocations in selected range
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "sum(\n  increase(tool_invocations_total{application=\"\
          $application\",namespace=\"$namespace\"}[$__range])\n) or vector(0)"
        legend: Tools
  tool_duration_p95:
    id: tool_duration_p95
    kind: metric
    description: Tool p95 duration (seconds)
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "histogram_quantile(0.95,\n  sum by (le) (\n    rate(tool_duration_seconds_bucket{application=\"\
          $application\",namespace=\"$namespace\"}[$__rate_interval])\n  )\n) or vector(0)"
        legend: p95
