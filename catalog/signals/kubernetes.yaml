apiVersion: am.obs/v1
kind: SignalModule
module: kubernetes
dashboard: technical
signals:
  k8s_pod_count:
    id: k8s_pod_count
    kind: metric
    description: Running pod count for this service (cAdvisor)
    panel_type: stat
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        expr_template: "count(\n  count by (pod) (\n    container_memory_working_set_bytes{namespace=\"\
          $namespace\",pod=~\"$app.*\",container!=\"\",container!=\"POD\"}\n  )\n)"
  k8s_image_version:
    id: k8s_image_version
    kind: metric
    description: Container image(s) currently running
    panel_type: table
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        join_field: image
        queries:
        - refId: Image
          legend: pods
          expr_template: "count by (image) (\n  container_cpu_usage_seconds_total{namespace=\"\
            $namespace\",pod=~\"$app.*\",container!=\"\",container!=\"POD\"}\n)"
  k8s_helm_chart:
    id: k8s_helm_chart
    kind: metric
    description: Helm chart version label on pods (helm.sh/chart)
    panel_type: table
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        join_field: helm_sh_chart
        queries:
        - refId: Chart
          legend: pods
          expr_template: "count by (helm_sh_chart) (\n  up{namespace=\"$namespace\"\
            ,pod=~\"$app.*\",helm_sh_chart!=\"\"}\n) or label_replace(\n  count by\
            \ (label_helm_sh_chart) (\n    kube_pod_labels{namespace=\"$namespace\"\
            ,pod=~\"$app.*\",label_helm_sh_chart!=\"\"}\n  ),\n  \"helm_sh_chart\"\
            , \"$1\", \"label_helm_sh_chart\", \"(.*)\"\n)"
  k8s_app_version:
    id: k8s_app_version
    kind: metric
    description: App version label on pods (app.kubernetes.io/version)
    panel_type: table
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        join_field: app_kubernetes_io_version
        queries:
        - refId: Version
          legend: pods
          expr_template: "count by (app_kubernetes_io_version) (\n  up{namespace=\"\
            $namespace\",pod=~\"$app.*\",app_kubernetes_io_version!=\"\"}\n) or label_replace(\n\
            \  count by (label_app_kubernetes_io_version) (\n    kube_pod_labels{namespace=\"\
            $namespace\",pod=~\"$app.*\",label_app_kubernetes_io_version!=\"\"}\n\
            \  ),\n  \"app_kubernetes_io_version\", \"$1\", \"label_app_kubernetes_io_version\"\
            , \"(.*)\"\n)"
  k8s_cpu_usage:
    id: k8s_cpu_usage
    kind: metric
    description: Container CPU usage (cAdvisor)
    panel_type: timeseries
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        expr_template: sum(rate(container_cpu_usage_seconds_total{namespace="$namespace",pod=~"$app.*",container!="",container!="POD"}[5m]))
  k8s_memory_usage:
    id: k8s_memory_usage
    kind: metric
    description: Container memory working set
    panel_type: timeseries
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        expr_template: sum(container_memory_working_set_bytes{namespace="$namespace",pod=~"$app.*",container!="",container!="POD"})
  k8s_restarts:
    id: k8s_restarts
    kind: metric
    description: Pod container restart total (kube-state-metrics)
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    omit_warn: Requires kube-state-metrics; omit+warn if missing on cluster
    adapter_map:
      prometheus:
        expr_template: sum(kube_pod_container_status_restarts_total{namespace="$namespace",pod=~"$app.*"})
  service_health_up:
    id: service_health_up
    kind: metric
    description: Prometheus scrape target up for this pod
    panel_type: stat
    adapters:
    - prometheus
    optional: true
    adapter_map:
      prometheus:
        expr_template: "max(up{job=\"kubernetes-pods\",namespace=\"$namespace\",pod=~\"\
          $app.*\"})\n  or max(up{kubernetes_namespace=\"$namespace\",kubernetes_pod_name=~\"\
          $app.*\"})"
  service_health_score:
    id: service_health_score
    kind: metric
    description: "Quick-decision health score 0\u2013100 (scrape, restarts, 5xx ratio,\
      \ heap). GOOD\u226580, WATCH 50\u201379, ACT <50."
    panel_type: gauge
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        expr_template: "clamp_min(\n  clamp_max(\n    100\n    - 40 * (1 - clamp_max(\n\
          \        max(up{job=\"kubernetes-pods\",namespace=\"$namespace\",pod=~\"\
          $app.*\"})\n          or max(up{namespace=\"$namespace\",pod=~\"$app.*\"\
          })\n          or vector(0),\n        1))\n    - 15 * clamp_max(\n      \
          \  ((sum(kube_pod_container_status_restarts_total{namespace=\"$namespace\"\
          ,pod=~\"$app.*\"}) or vector(0)) > bool 0),\n        1)\n    - 10 * clamp_max(\n\
          \        ((sum(kube_pod_container_status_restarts_total{namespace=\"$namespace\"\
          ,pod=~\"$app.*\"}) or vector(0)) >= bool 3),\n        1)\n    - 15 * clamp_max(\n\
          \        (\n          (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\",status=~\"5..\"}[5m])) or vector(0))\n\
          \          /\n          clamp_min(\n            (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\"}[5m])) or vector(0)),\n        \
          \    1e-9\n          )\n          >= bool 0.01\n        ),\n        1)\n\
          \    - 15 * clamp_max(\n        (\n          (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\",status=~\"5..\"}[5m])) or vector(0))\n\
          \          /\n          clamp_min(\n            (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\"}[5m])) or vector(0)),\n        \
          \    1e-9\n          )\n          >= bool 0.05\n        ),\n        1)\n\
          \    - 10 * clamp_max(\n        (\n          (sum(jvm_memory_used_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(0))\n          /\n          clamp_min((sum(jvm_memory_max_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(1)), 1)\n          >= bool 0.7\n\
          \        ),\n        1)\n    - 10 * clamp_max(\n        (\n          (sum(jvm_memory_used_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(0))\n          /\n          clamp_min((sum(jvm_memory_max_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(1)), 1)\n          >= bool 0.9\n\
          \        ),\n        1),\n    100),\n  0)"
  service_health_status:
    id: service_health_status
    kind: metric
    description: "Decision band from health score \u2014 2=GOOD, 1=WATCH, 0=ACT"
    panel_type: stat
    adapters:
    - prometheus
    adapter_map:
      prometheus:
        expr_template: "(\n  clamp_min(\n    clamp_max(\n      100\n      - 40 * (1\
          \ - clamp_max(\n          max(up{job=\"kubernetes-pods\",namespace=\"$namespace\"\
          ,pod=~\"$app.*\"})\n            or max(up{namespace=\"$namespace\",pod=~\"\
          $app.*\"})\n            or vector(0),\n          1))\n      - 15 * clamp_max(\n\
          \          ((sum(kube_pod_container_status_restarts_total{namespace=\"$namespace\"\
          ,pod=~\"$app.*\"}) or vector(0)) > bool 0),\n          1)\n      - 10 *\
          \ clamp_max(\n          ((sum(kube_pod_container_status_restarts_total{namespace=\"\
          $namespace\",pod=~\"$app.*\"}) or vector(0)) >= bool 3),\n          1)\n\
          \      - 15 * clamp_max(\n          (\n            (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\",status=~\"5..\"}[5m])) or vector(0))\n\
          \            /\n            clamp_min(\n              (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\"}[5m])) or vector(0)),\n        \
          \      1e-9\n            )\n            >= bool 0.01\n          ),\n   \
          \       1)\n      - 15 * clamp_max(\n          (\n            (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\",status=~\"5..\"}[5m])) or vector(0))\n\
          \            /\n            clamp_min(\n              (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\"}[5m])) or vector(0)),\n        \
          \      1e-9\n            )\n            >= bool 0.05\n          ),\n   \
          \       1)\n      - 10 * clamp_max(\n          (\n            (sum(jvm_memory_used_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(0))\n            /\n          \
          \  clamp_min((sum(jvm_memory_max_bytes{application=\"$application\",area=\"\
          heap\"}) or vector(1)), 1)\n            >= bool 0.7\n          ),\n    \
          \      1)\n      - 10 * clamp_max(\n          (\n            (sum(jvm_memory_used_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(0))\n            /\n          \
          \  clamp_min((sum(jvm_memory_max_bytes{application=\"$application\",area=\"\
          heap\"}) or vector(1)), 1)\n            >= bool 0.9\n          ),\n    \
          \      1),\n      100),\n    0)\n  >= bool 80\n) + (\n  clamp_min(\n   \
          \ clamp_max(\n      100\n      - 40 * (1 - clamp_max(\n          max(up{job=\"\
          kubernetes-pods\",namespace=\"$namespace\",pod=~\"$app.*\"})\n         \
          \   or max(up{namespace=\"$namespace\",pod=~\"$app.*\"})\n            or\
          \ vector(0),\n          1))\n      - 15 * clamp_max(\n          ((sum(kube_pod_container_status_restarts_total{namespace=\"\
          $namespace\",pod=~\"$app.*\"}) or vector(0)) > bool 0),\n          1)\n\
          \      - 10 * clamp_max(\n          ((sum(kube_pod_container_status_restarts_total{namespace=\"\
          $namespace\",pod=~\"$app.*\"}) or vector(0)) >= bool 3),\n          1)\n\
          \      - 15 * clamp_max(\n          (\n            (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\",status=~\"5..\"}[5m])) or vector(0))\n\
          \            /\n            clamp_min(\n              (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\"}[5m])) or vector(0)),\n        \
          \      1e-9\n            )\n            >= bool 0.01\n          ),\n   \
          \       1)\n      - 15 * clamp_max(\n          (\n            (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\",status=~\"5..\"}[5m])) or vector(0))\n\
          \            /\n            clamp_min(\n              (sum(rate(http_server_requests_seconds_count{application=\"\
          $application\",namespace=\"$namespace\"}[5m])) or vector(0)),\n        \
          \      1e-9\n            )\n            >= bool 0.05\n          ),\n   \
          \       1)\n      - 10 * clamp_max(\n          (\n            (sum(jvm_memory_used_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(0))\n            /\n          \
          \  clamp_min((sum(jvm_memory_max_bytes{application=\"$application\",area=\"\
          heap\"}) or vector(1)), 1)\n            >= bool 0.7\n          ),\n    \
          \      1)\n      - 10 * clamp_max(\n          (\n            (sum(jvm_memory_used_bytes{application=\"\
          $application\",area=\"heap\"}) or vector(0))\n            /\n          \
          \  clamp_min((sum(jvm_memory_max_bytes{application=\"$application\",area=\"\
          heap\"}) or vector(1)), 1)\n            >= bool 0.9\n          ),\n    \
          \      1),\n      100),\n    0)\n  >= bool 50\n)"
