apiVersion: am.obs/v1
kind: ServiceObservability
service: am-portfolio
tier: A
runtime: java
k8s_app_label: am-portfolio
metrics_application: portfolio-app
namespace: am-apps-preprod
owners: [portfolio]
signals:
  uses:
    - http_request_rate
    - http_requests_by_status
    - http_requests_by_outcome
    - http_requests_2xx
    - http_requests_4xx
    - http_error_rate
    - http_latency_p95
    - http_latency_p95_by_uri
    - http_requests_by_uri
    - http_client_request_rate
    - jvm_heap_used
    - jvm_heap_max
    - jvm_nonheap_used
    - jvm_gc_pause
    - jvm_threads_live
    - process_cpu_usage
    - process_files_open
    - system_cpu_usage
    - logback_events
    - tomcat_threads_busy
    - service_health_up
    - mongo_commands
    - mongo_pool_checkedout
    - redis_commands
    - kafka_listener
    - kafka_listener_errors
    - k8s_cpu_usage
    - k8s_memory_usage
    - k8s_restarts
    - service_logs_all
    - service_error_logs
    - trace_latency_p95
functional: []
