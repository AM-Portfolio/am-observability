apiVersion: am.obs/v1
kind: ServiceObservability
service: am-portfolio
tier: A
runtime: java
k8s_app_label: am-portfolio
metrics_application: portfolio-app
namespace: am-apps-preprod
owners: [portfolio]
signals:
  uses:
    - k8s_pod_count
    - service_health_up
    - service_health_score
    - service_health_status
    - k8s_restarts
    - process_uptime
    - k8s_cpu_usage
    - k8s_memory_usage
    - jvm_heap_used_ratio
    - k8s_image_version
    - k8s_helm_chart
    - k8s_app_version
    - http_request_rate
    - http_requests_by_uri
    - http_latency_p95
    - http_latency_avg_by_uri
    - http_latency_p95_by_uri
    - http_latency_p50
    - http_latency_p75
    - http_error_ratio
    - http_error_rate_total
    - http_error_rate
    - process_cpu_usage
    - http_api_performance_table
    - http_requests_by_status
    - http_requests_by_outcome
    - http_requests_2xx
    - http_requests_4xx
    - http_error_rate
    - http_client_request_rate
    - mongo_commands
    - mongo_commands_p95
    - mongo_pool_checkedout
    - mongo_pool_size
    - redis_commands
    - redis_commands_p95
    - kafka_listener
    - kafka_listener_errors
    - kafka_listener_p95
    - kafka_consumer_lag
    - hikari_connections_active
    - hikari_connections_pending
    - hikari_connections_idle
    - hikari_connections_timeout
    - portfolio_users_total
    - portfolio_portfolios_total
    - portfolio_holdings_total
    - jvm_heap_used
    - jvm_heap_max
    - jvm_nonheap_used
    - jvm_gc_pause
    - jvm_threads_live
    - tomcat_threads_busy
    - process_files_open
    - system_cpu_usage
    - logback_events
    - service_logs_all
    - service_error_logs
    - trace_latency_p95
functional: []
