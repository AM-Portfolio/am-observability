# Release shared Grafana dashboards for am-infra obs-upgrade (Plane B)
name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag override (e.g. v0.4.1). Empty = next patch version."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release-dashboards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version || '' }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "version must look like vX.Y.Z, got: $VERSION"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          else
            LATEST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
            if [[ -z "$LATEST" ]]; then
              VERSION="v0.1.0"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
              VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.ver.outputs.create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
          else
            git tag -a "$VERSION" -m "am-observability $VERSION"
            git push origin "$VERSION"
          fi

      - name: Generate + package
        run: make package-release VERSION=${{ steps.ver.outputs.version }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/release/grafana-dashboards-${{ steps.ver.outputs.version }}.zip
            dist/release/grafana-dashboards-${{ steps.ver.outputs.version }}.zip.sha256
            dist/release/catalog-index.json
            dist/release/compat.json
            dist/release/schema/service-observability.schema.json
          generate_release_notes: true
          make_latest: true
          overwrite_files: true

      - name: Dispatch am-infra to apply ConfigMaps (no Grafana restart)
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::warning::INFRA_DISPATCH_TOKEN not set — skip auto apply. Run am-infra obs-upgrade manually (mode=apply)."
            exit 0
          fi
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Dispatching obs-dashboards-released version=$VERSION to AM-Portfolio/am-infra"
          gh api repos/AM-Portfolio/am-infra/dispatches \
            -f event_type='obs-dashboards-released' \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[obs_repo]=AM-Portfolio/am-observability"

      - name: Upload workflow artifacts (dispatch)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafana-dashboards-${{ steps.ver.outputs.version }}
          path: dist/release/
